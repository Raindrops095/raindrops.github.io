<script>
  function getInput() {
    const dic = {
      "a": "", "b": "", "c": "", "d": "", "e": "", "f": "", "g": "", "h": "", "i": "", "j": "", "k": "", "l": "", "m": "", "n": "", "o": "", "p": "", "q": "", "r": "", "s": "", "t": "", "u": "", "v": "", "w": "", "x": "", "y": "", "z": ""
    };

    const userWords = document.getElementsByName("userInput");
    let i = 0;

    for (let letter in dic) {
      dic[letter] = userWords[i].value.trim();
      i++;
    }

    return dic;
  }

  function generatePoem(dic, linesAmount, originalThree) {

    function abc(nextWord){
      currentLine = [...nextWord]
      .map(letter => dic[letter] || "")
      .join(" ")
      .trim();

    poemLines.push(currentLine);
    return currentLine.split(" ")[0];
    }
  const poemLines = [];

 
  originalThree = originalThree.toLowerCase();
  

  
  let currentLine = [...originalThree]
    .map(letter => dic[letter] || "")
    .join(" ")
    .trim();

  poemLines.push(currentLine);
  firstWord = currentLine.split(" ")[0];
  secWord = currentLine.split(" ")[1];
  thirdWord = currentLine.split(" ")[2];

  console.log(secWord);
  console.log(thirdWord);
  // Generate remaining lines
  for (let i = 1; i < linesAmount; i+=3) {

    firstWord = abc(firstWord);
    secWord = abc(secWord);
    thirdWord = abc(thirdWord);
    
  
  }

  return poemLines.join("<br>");
}


  function submitPoem() {
    const dic = getInput();
    const linesAmount = parseInt(document.getElementById("Lines").value);

    let orginalThree = document.getElementById("IBM").value;

    if (linesAmount === 0) {
      alert("Add a line amount");
      return;
    }

    const poem = generatePoem(dic, linesAmount, orginalThree);
    document.getElementById("IBMPoem").innerHTML = poem;
  }
