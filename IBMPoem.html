<html lang="en">

  <head>
    <title>This is a website</title>

  </head>

<body>
  <header>
        <nav>
            <h2 class="logo">Raindrops Profolio</h2>
            <ul class="nav-links">
                <li><a href="./index.html#home" class="nav-link active">Home</a></li>
                <li><a href="./index.html#about" class="nav-link">About</a></li>
                <li><a href="./index.html#projects" class="nav-link">Projects</a></li>
                <li><a href="./index.html#contact" class="nav-link">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section id="pro" class="section pro">
    <h3>Enter in your words</h3>
    <p> a = <input name="userInput" type="text" id="a">  n = <input name="userInput" type="text" id="n"> </p>
    <p> b = <input name="userInput" type="text" id="b">  o = <input name="userInput" type="text" id="o"> </p>
    <p> c = <input name="userInput" type="text" id="c">  p = <input name="userInput" type="text" id="p">  </p>
    <p> d = <input name="userInput" type="text" id="d">  q = <input name="userInput" type="text" id="q">  </p>
    <p> e = <input name="userInput" type="text" id="e">  r = <input name="userInput" type="text" id="r"> </p>
    <p> f = <input name="userInput" type="text" id="f">  s = <input name="userInput" type="text" id="s"> </p>
    <p> g = <input name="userInput" type="text" id="g">  t = <input name="userInput" type="text" id="t"> </p>
    <p> h = <input name="userInput" type="text" id="h">  u = <input name="userInput" type="text" id="u"> </p>
    <p> i = <input name="userInput" type="text" id="i">  v = <input name="userInput" type="text" id="t">  </p>
    <p> j = <input name="userInput" type="text" id="j">  w = <input name="userInput" type="text" id="w">   </p>
    <p> k = <input name="userInput" type="text" id="k">  x = <input name="userInput" type="text" id="x">  </p>
    <p> l = <input name="userInput" type="text" id="l">  y = <input name="userInput" type="text" id="y">  </p>
    <p> m = <input name="userInput" type="text" id="m">  z = <input name="userInput" type="text" id="z"> </p>
    

    <p> Enter 3 letters: <input name="threeInput" type="text" id="IBM" maxlength="3"></p>

    <select id="Lines">
        <option value="0">-- select how many lines you would like --</option>
        <option value="4">4</option>
        <option value="7">7</option>
        <option value="10">10</option>
        <option value="13">13</option>
        <option value="16">16</option>
    </select>

    <button onclick="submitPoem()">Submit</button>
    <p id="IBMPoem"></p>
    </section>
</body>

<script>
  function getInput() {
    const dic = {
      "a": "", "n": "", "b": "","o": "", "c": "", "p": "", "d": "", "q": "", "e": "", "r": "", "f": "",  "s": "",  "g": "", "t": "", "h": "", "u": "", "i": "", "v": "", "j": "", "w": "", "k": "", "x": "", "l": "",  "y": "", "m": "", "z": ""
    };

    const userWords = document.getElementsByName("userInput");
    let i = 0;

    for (let letter in dic) {
      dic[letter] = userWords[i].value.trim();
      i++;
    }

    return dic;
  }

  function generatePoem(dic, linesAmount, originalThree) {

  const poemLines = [];
  const wordCount = {};

  function styleLine(line) {
    return line
      .split(" ")
      .map(word => {
        if (!word) return "";

        if (!wordCount[word]) {
          wordCount[word] = 16;
        }
        wordCount[word]++;

        return `<span style="font-size:${wordCount[word]}px">${word}</span>`;
      })
      .join(" ");
  }

  function nextLineGen(nextWord) {
    const currentLine = [...nextWord]
      .map(letter => dic[letter] || "").join(" ").trim();

    poemLines.push(styleLine(currentLine));
    return currentLine.split(" ")[0];
  }

  originalThree = originalThree.toLowerCase();

  let currentLine = [...originalThree]
    .map(letter => dic[letter] || "").join(" ").trim();

  poemLines.push(styleLine(currentLine));

  let firstWord = currentLine.split(" ")[0];
  let secWord = currentLine.split(" ")[1];
  let thirdWord = currentLine.split(" ")[2];

  for (let i = 1; i < linesAmount; i += 3) {
    firstWord = nextLineGen(firstWord);
    secWord = nextLineGen(secWord);
    thirdWord = nextLineGen(thirdWord);
  }

  return poemLines.join("<br>");
}


  function submitPoem() {
    const dic = getInput();
    const linesAmount = parseInt(document.getElementById("Lines").value);

    let orginalThree = document.getElementById("IBM").value;

    if (linesAmount === 0) {
      alert("Add a line amount");
      return;
    }

    const poem = generatePoem(dic, linesAmount, orginalThree);
    document.getElementById("IBMPoem").innerHTML = poem;
  }
</script>
