<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blackout Poetry Generator</title>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f4f4f4;
    }

    #textContainer {
        margin-top: 20px;
        line-height: 2em;
    }

    .word {
        cursor: pointer;
        padding: 2px 4px;
        margin: 2px;
        display: inline-block;
    }

    .blacked {
        background-color: black;
        color: black;
    }

    #poemOutput {
        margin-top: 30px;
        padding: 15px;
        background: white;
        border: 1px solid #ccc;
    }

    button {
        margin-top: 20px;
        padding: 10px 15px;
        cursor: pointer;
    }
</style>
</head>
<body>

<h1>Blackout Poetry Maker</h1>

<input type="file" id="fileInput" accept=".txt">

<div id="textContainer"></div>

<button onclick="generatePoem()">Generate Poem</button>

<h2>Your Blackout Poem:</h2>
<div id="poemOutput"></div>

<script>

const fileInput = document.getElementById("fileInput");
const textContainer = document.getElementById("textContainer");

fileInput.addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        displayText(e.target.result);
    };
    reader.readAsText(file);
});

function displayText(text) {
    textContainer.innerHTML = "";
    const words = text.split(/\s+/);

    words.forEach(word => {
        const span = document.createElement("span");
        span.textContent = word + " ";
        span.classList.add("word");

        span.addEventListener("click", function() {
            span.classList.toggle("blacked");
        });

        textContainer.appendChild(span);
    });
}

function generatePoem() {
    const words = document.querySelectorAll(".word");
    let poem = "";

    words.forEach(word => {
        if (!word.classList.contains("blacked")) {
            poem += word.textContent;
        }
    });

    document.getElementById("poemOutput").textContent = poem;
}

</script>

</body>
</html>
